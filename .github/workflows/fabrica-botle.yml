name: Fabrica-Bottle

on:
  workflow_dispatch:
    inputs:
      formula:
        description: "Fórmula do Homebrew (ex: llvm, rust, gcc)"
        required: true
        default: "llvm"

env:
  MACOSX_DEPLOYMENT_TARGET: "13.0"

jobs:
  build-and-bottle:
    runs-on: macos-15-intel
    timeout-minutes: 360

    steps:
      - name: Diagnóstico do ambiente
        run: |
          uname -m
          sw_vers
          echo "MACOSX_DEPLOYMENT_TARGET=$MACOSX_DEPLOYMENT_TARGET"
          brew --version
          df -h /

      - name: Liberar espaço em disco
        run: |
          sudo rm -rf /Applications/Xcode_*.app || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/hostedtoolcache || true
          df -h /

      - name: Atualizar Homebrew
        run: brew update

      - name: Compilar ${{ github.event.inputs.formula }}
        run: |
          FORMULA="${{ github.event.inputs.formula }}"

          if [ "$FORMULA" = "llvm" ]; then
            export HOMEBREW_NO_INSTALL_FROM_API=1
            FORMULA_PATH="$(brew formula llvm)"

            # Limitar targets a X86
            sed -i '' 's/-DLLVM_TARGETS_TO_BUILD=all/-DLLVM_TARGETS_TO_BUILD=X86/' "$FORMULA_PATH"
            sed -i '' 's/-DLLVM_TARGETS_TO_BUILD=Native.*"/-DLLVM_TARGETS_TO_BUILD=X86"/' "$FORMULA_PATH"

            # Injetar deployment target no CMake
            echo '      -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0' > /tmp/deploy_target.txt
            sed -i '' '122r /tmp/deploy_target.txt' "$FORMULA_PATH"

            grep -n 'TARGETS_TO_BUILD\|DEPLOYMENT_TARGET' "$FORMULA_PATH"
          fi

          brew install --build-bottle --verbose "$FORMULA"

      - name: Gerar bottle
        run: |
          cd /tmp
          brew bottle --no-rebuild --json ${{ github.event.inputs.formula }}
          ls -lh *.bottle.*

      - name: Upload do bottle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.formula }}-ventura-bottle
          path: /tmp/*.bottle.*
          retention-days: 30

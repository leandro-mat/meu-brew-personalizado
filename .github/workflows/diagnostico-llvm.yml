name: Diagnóstico fórmula LLVM
on:
  workflow_dispatch:

jobs:
  diagnostico:
    runs-on: macos-15-intel
    timeout-minutes: 10

    steps:
      - name: Atualizar Homebrew
        run: brew update

      - name: Diagnóstico da fórmula LLVM
        run: |
          export HOMEBREW_NO_INSTALL_FROM_API=1
          FORMULA_PATH="$(brew formula llvm)"

          echo "=== Caminho da fórmula ==="
          echo "$FORMULA_PATH"

          echo ""
          echo "=== ANTES dos seds ==="
          grep -n 'TARGETS_TO_BUILD\|DEPLOYMENT_TARGET\|OSX_SYSROOT' "$FORMULA_PATH"

          echo ""
          echo "=== Aplicando seds ==="
          sed -i '' 's/-DLLVM_TARGETS_TO_BUILD=all/-DLLVM_TARGETS_TO_BUILD=X86/' "$FORMULA_PATH"
          sed -i '' 's/-DLLVM_TARGETS_TO_BUILD=Native.*"/-DLLVM_TARGETS_TO_BUILD=X86"/' "$FORMULA_PATH"
          sed -i '' '/-DCMAKE_OSX_SYSROOT/a\
            "-DCMAKE_OSX_DEPLOYMENT_TARGET=13.0",' "$FORMULA_PATH"

          echo ""
          echo "=== DEPOIS dos seds ==="
          grep -n 'TARGETS_TO_BUILD\|DEPLOYMENT_TARGET\|OSX_SYSROOT' "$FORMULA_PATH"

          echo ""
          echo "=== Contexto da linha SYSROOT (10 linhas depois) ==="
          grep -n -A10 'OSX_SYSROOT' "$FORMULA_PATH"
